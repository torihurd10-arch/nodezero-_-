<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NodeZero – Room Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgDark: "#050816",
            neonGreen: "#00FF9C",
            neonBlue: "#00C8FF"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-bgDark text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-4">
      <h1 id="roomTitle" class="text-2xl font-bold text-neonBlue">Room Title</h1>
      <button onclick="goBack()" class="text-xs border border-gray-500 px-2 py-1 rounded hover:bg-gray-800">Back to Dashboard</button>
    </div>

    <p id="roomDesc" class="text-gray-300 mb-4">Room description goes here.</p>

    <div class="bg-black/60 border border-neonBlue/60 rounded-lg p-4 mb-6 shadow-[0_0_20px_rgba(0,200,255,0.2)]">
      <h2 class="text-lg font-semibold text-neonGreen mb-2">Mission Tasks</h2>
      <ul id="taskList" class="list-disc pl-5 text-gray-300"></ul>
    </div>

    <div class="bg-black/60 border border-neonGreen/60 rounded-lg p-4 shadow-[0_0_20px_rgba(0,255,156,0.2)]">
      <h2 class="text-lg font-semibold text-neonBlue mb-2">Hints</h2>
      <ul id="hintList" class="list-disc pl-5 text-gray-300"></ul>
    </div>

    <button id="completeBtn"
            class="mt-6 inline-block px-4 py-2 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20 transition">
      Mark as Complete
    </button>
    <button onclick="nextRoom()"
            class="mt-2 inline-block px-4 py-2 bg-neonBlue/10 border border-neonBlue text-neonBlue rounded hover:bg-neonBlue/20 transition">
      Next Room →
    </button>
  </div>

  <script>
    const rooms = {
      "room0_1": {
        title: "Room 0.1 — Files & Folders",
        desc: "Learn how to navigate files and folders using simple commands.",
        tasks: [
          "Open File Explorer and locate your Documents folder.",
          "Create a new folder named 'NodeZero_Practice'.",
          "Inside that folder, create a text file named 'mission.txt'.",
          "Write 'Mission Complete' inside and save it."
        ],
        hints: [
          "Use right-click → New → Folder to create folders.",
          "Double-click to open folders.",
          "Right-click → New → Text Document to create files."
        ]
      },
      "room0_2": {
        title: "Room 0.2 — Downloads & Installs",
        desc: "Learn how to download and install software safely.",
        tasks: [
          "Open your browser and search for 'Notepad++ download'.",
          "Click the official site and download the installer.",
          "Run the installer and follow the prompts.",
          "Open Notepad++ and type 'Mission Complete'."
        ],
        hints: [
          "Always download from official websites.",
          "Avoid clicking ads or pop-ups."
        ]
      },
      "room0_3": {
        title: "Room 0.3 — Keyboard & Mouse",
        desc: "Get comfortable with typing and mouse control.",
        tasks: [
          "Open WordPad or Notepad.",
          "Type your name three times.",
          "Right-click the text and copy it.",
          "Paste it below and save the file."
        ],
        hints: [
          "Ctrl + C = Copy, Ctrl + V = Paste.",
          "Right-click menus show quick actions."
        ]
      },
      "room0_4": {
        title: "Room 0.4 — File Explorer",
        desc: "Learn to navigate folders and files.",
        tasks: [
          "Open File Explorer.",
          "Go to Documents.",
          "Create a folder named 'NodeZero_Practice'.",
          "Move a file into that folder."
        ],
        hints: [
          "Use the left sidebar to jump between folders.",
          "Drag-and-drop moves files easily."
        ]
      },
      "room0_5": {
        title: "Room 0.5 — Task Manager",
        desc: "Learn how to manage running programs.",
        tasks: [
          "Press Ctrl + Shift + Esc to open Task Manager.",
          "Find a program you recognize.",
          "Click 'End Task' to close it.",
          "Reopen the program normally."
        ],
        hints: [
          "Use Task Manager only for frozen apps.",
          "Never end system tasks unless instructed."
        ]
      },
      "room1_1": {
        title: "Room 1.1 — User Accounts",
        desc: "Learn how to create and manage user accounts.",
        tasks: [
          "Open Control Panel → User Accounts.",
          "Click 'Manage another account'.",
          "Create a new local user named 'TestUser'.",
          "Switch accounts and log in as TestUser."
        ],
        hints: [
          "Search 'User Accounts' in the Start menu.",
          "Admin accounts can install software; standard cannot."
        ]
      },
      "room1_2": {
        title: "Room 1.2 — Permissions & Access",
        desc: "Understand admin vs standard accounts and folder permissions.",
        tasks: [
          "Right-click a folder → Properties → Security.",
          "View which users have access.",
          "Add or remove permissions for TestUser.",
          "Try opening the folder from TestUser’s account."
        ],
        hints: [
          "Use 'Edit' under Security to change permissions.",
          "Standard users may get 'Access Denied' messages."
        ]
      },
      "room1_3": {
        title: "Room 1.3 — Control Panel & Settings",
        desc: "Explore Control Panel and Windows Settings.",
        tasks: [
          "Open Control Panel.",
          "Navigate to 'System and Security'.",
          "Change your power settings.",
          "Open Windows Settings and adjust display brightness."
        ],
        hints: [
          "Control Panel shows classic tools; Settings is modern.",
          "Use the search bar to find options quickly."
        ]
      },
      "room1_4": {
        title: "Room 1.4 — Folder Sharing",
        desc: "Share folders between users.",
        tasks: [
          "Right-click a folder → Properties → Sharing.",
          "Click 'Share…' and add TestUser.",
          "Log in as TestUser and open the shared folder.",
          "Confirm you can see the files."
        ],
        hints: [
          "Sharing works best when both accounts are on the same PC.",
          "Use 'Advanced Sharing' for more control."
        ]
      },
      "room1_5": {
        title: "Room 1.5 — Personalization",
        desc: "Change desktop background and theme.",
        tasks: [
          "Right-click desktop → Personalize.",
          "Change background image.",
          "Switch to dark mode.",
          "Adjust display resolution."
        ],
        hints: [
          "Personalization helps identify your workspace.",
          "Dark mode reduces eye strain."
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const roomId = params.get("id");
    const room = rooms[roomId];

    function goBack() {
      window.location.href = "index.html";
    }

    function nextRoom() {
      const progress = JSON.parse(localStorage.getItem("nodezero_progress") || "{}");
      const roomIds = Object.keys(rooms);
      const currentIndex = roomIds.indexOf(roomId);
      const nextIndex = currentIndex + 1;

      if (nextIndex < roomIds.length) {
        const nextId = roomIds[nextIndex];
        if (progress[roomId]) {
          window.location.href = `room.html?id=${nextId}`;
        } else {
          alert("Complete this mission first to unlock the next room.");
        }
      } else {
        alert("You’ve completed all rooms! Returning to dashboard.");
        window.location.href = "index.html";
      }
    }

    function renderRoom() {
      if (!room) {
        document.getElementById("roomTitle").textContent = "Room not found";
        document.getElementById("roomDesc").textContent = "Select a room from the dashboard to continue.";
        document.getElementById("taskList").innerHTML = "<li>No mission details available.</li>";
        document.getElementById("hintList").innerHTML = "<li>No hints available.</li>";
        document.getElementById("completeBtn").style.display = "none";
        return;
      }

      document.getElementById("roomTitle").textContent = room.title;
      document.getElementById("roomDesc").textContent = room.desc;
      const taskList = document.getElementById("taskList");
      const hintList = document.getElementById("hintList");

      taskList.innerHTML = "";
      room.tasks.forEach(task => {
        const li = document.createElement("li");
        li.textContent = task;
        taskList.appendChild(li);
      });

      hintList.innerHTML = "";
      room.hints.forEach(hint => {
        const li = document.createElement("li");
        li.textContent = hint;
        hintList.appendChild(li);
      });
    }

    document.getElementById("completeBtn").addEventListener("click", () => {
      if (!roomId) {
        alert("No room selected.");
        return;
      }

      const progress = JSON.parse(localStorage.getItem("nodezero_progress") || "{}");
      progress[roomId] = true;
      localStorage.setItem("nodezero_progress", JSON.stringify(progress));
      const xp = parseInt(localStorage.getItem("nodezero_xp") || "0", 10) + 50;
      localStorage.setItem("nodezero_xp", String(xp));
      alert("Mission complete! +50 XP");
      window.location.href = "index.html";
    });

    renderRoom();
  </script>
</body>
</html>
