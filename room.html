<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NodeZero – Room Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgDark: "#050816",
            neonGreen: "#00FF9C",
            neonBlue: "#00C8FF"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-bgDark text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-4">
      <h1 id="roomTitle" class="text-2xl font-bold text-neonBlue">Room Title</h1>
      <button onclick="goBack()" class="text-xs border border-gray-500 px-2 py-1 rounded hover:bg-gray-800">Back to Dashboard</button>
    </div>

    <p id="roomDesc" class="text-gray-300 mb-4">Room description goes here.</p>

    <div class="bg-black/60 border border-neonBlue/60 rounded-lg p-4 mb-6 shadow-[0_0_20px_rgba(0,200,255,0.2)]">
      <h2 class="text-lg font-semibold text-neonGreen mb-2">Mission Tasks</h2>
      <ul id="taskList" class="list-disc pl-5 text-gray-300"></ul>
    </div>

    <div class="bg-black/60 border border-neonGreen/60 rounded-lg p-4 shadow-[0_0_20px_rgba(0,255,156,0.2)]">
      <h2 class="text-lg font-semibold text-neonBlue mb-2">Hints</h2>
      <ul id="hintList" class="list-disc pl-5 text-gray-300"></ul>
    </div>

    <button id="completeBtn"
            class="mt-6 inline-block px-4 py-2 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20 transition">
      Mark as Complete
    </button>
  </div>

  <script>
    const rooms = {
      "room0_1": {
        title: "Room 0.1 — Files & Folders",
        desc: "Learn how to navigate files and folders using simple commands.",
        tasks: [
          "Open File Explorer and locate your Documents folder.",
          "Create a new folder named 'NodeZero_Practice'.",
          "Inside that folder, create a text file named 'mission.txt'.",
          "Write 'Mission Complete' inside and save it."
        ],
        hints: [
          "Use right-click → New → Folder to create folders.",
          "Double-click to open folders.",
          "Right-click → New → Text Document to create files."
        ]
      },
      "room0_2": {
        title: "Room 0.2 — User Accounts",
        desc: "Understand local users and admin vs standard accounts.",
        tasks: [
          "Open Control Panel → User Accounts.",
          "View your current account type.",
          "Create a new local user account.",
          "Switch between accounts to see permissions."
        ],
        hints: [
          "Search 'User Accounts' in the Start menu.",
          "Admin accounts can install software; standard cannot."
        ]
      },
      "room0_3": {
        title: "Room 0.3 — Networking Basics",
        desc: "Learn IP, ping, and DNS at a basic level.",
        tasks: [
          "Open Command Prompt.",
          "Type 'ipconfig' to view your IP address.",
          "Type 'ping google.com' to test connectivity.",
          "Type 'nslookup google.com' to see DNS resolution."
        ],
        hints: [
          "Use Ctrl+C to stop a ping.",
          "Ping shows if your network is working."
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const roomId = params.get("id");
    const room = rooms[roomId];

    function goBack() {
      window.location.href = "index.html";
    }

    function renderRoom() {
      if (!room) {
        document.getElementById("roomTitle").textContent = "Room not found";
        document.getElementById("roomDesc").textContent = "Select a room from the dashboard to continue.";
        document.getElementById("taskList").innerHTML = "<li>No mission details available.</li>";
        document.getElementById("hintList").innerHTML = "<li>No hints available.</li>";
        document.getElementById("completeBtn").style.display = "none";
        return;
      }

      document.getElementById("roomTitle").textContent = room.title;
      document.getElementById("roomDesc").textContent = room.desc;
      const taskList = document.getElementById("taskList");
      const hintList = document.getElementById("hintList");

      taskList.innerHTML = "";
      room.tasks.forEach(task => {
        const li = document.createElement("li");
        li.textContent = task;
        taskList.appendChild(li);
      });

      hintList.innerHTML = "";
      room.hints.forEach(hint => {
        const li = document.createElement("li");
        li.textContent = hint;
        hintList.appendChild(li);
      });
    }

    document.getElementById("completeBtn").addEventListener("click", () => {
      if (!roomId) {
        alert("No room selected.");
        return;
      }

      const progress = JSON.parse(localStorage.getItem("nodezero_progress") || "{}");
      progress[roomId] = true;
      localStorage.setItem("nodezero_progress", JSON.stringify(progress));
      const xp = parseInt(localStorage.getItem("nodezero_xp") || "0", 10) + 50;
      localStorage.setItem("nodezero_xp", String(xp));
      alert("Mission complete! +50 XP");
      window.location.href = "index.html";
    });

    renderRoom();
  </script>
</body>
</html>
