<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 7 — Explain: Security Incident</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { bgDark: "#050816", neonGreen: "#00FF9C", neonBlue: "#00C8FF" } } }
    };
  </script>
  <style>
    .glow-border { box-shadow: 0 0 20px #00FF9C; }
    .fade-in { animation: fadeIn 1.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    textarea { background-color: rgba(0,0,0,0.6); border: 1px solid #00C8FF; color: #00FF9C; }
  </style>
</head>
<body class="bg-bgDark text-gray-100 min-h-screen flex flex-col items-center justify-center">
  <div class="max-w-3xl w-full bg-black/80 border border-neonGreen/60 rounded-lg p-6 text-center glow-border fade-in">
    <h1 class="text-3xl font-bold text-neonGreen mb-4">Step 7 — Explain</h1>
    <h2 class="text-xl text-neonBlue mb-4">Write the Security Incident Report</h2>
    <p class="text-gray-300 mb-6">Document the incident. Include: what happened, how it was detected, actions taken, and prevention steps.</p>
    <textarea id="explanation" rows="6" class="w-full rounded-lg p-3 mb-4" placeholder="Example: An employee fell victim to a phishing email and entered credentials on a spoofed login page. Detected via login alert from foreign IP. Immediately revoked account access and reset credentials. Email forwarding rule removed. User notified and enrolled in phishing awareness training. 2FA enforced on all accounts."></textarea>
    <button onclick="save()" class="px-6 py-3 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20 transition">✅ Save Incident Report</button>
    <p id="feedback" class="text-neonGreen font-semibold mt-6"></p>
    <button onclick="window.location.href='step8_repeat.html'" class="mt-6 px-6 py-3 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20 transition">Next Step → Repeat</button>
    <button onclick="window.location.href='step6_fix.html'" class="mt-2 px-6 py-2 bg-neonBlue/10 border border-neonBlue text-neonBlue rounded hover:bg-neonBlue/20 transition">← Back</button>
  </div>
  <script>
    function save() {
      const text = document.getElementById("explanation").value.trim();
      if (text.length < 20) { document.getElementById("feedback").textContent = "⚠️ Please write at least one full sentence."; return; }
      localStorage.setItem("room0_8_explanation", text);
      let xp = parseInt(localStorage.getItem("nodezero_xp") || "0", 10); xp += 25;
      localStorage.setItem("nodezero_xp", String(xp));
      document.getElementById("feedback").textContent = "✅ Incident report saved! +25 XP";
    }
  </script>
</body>
</html>
