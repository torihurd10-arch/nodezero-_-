<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 3 — Do: Build the Path</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { bgDark: "#050816", neonGreen: "#00FF9C", neonBlue: "#00C8FF" } } }
    };
  </script>
</head>
<body class="bg-bgDark text-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-3xl w-full bg-black/80 border border-neonBlue/60 rounded-lg p-6">
    <h1 class="text-3xl font-bold text-neonGreen mb-4">Step 3 — Do</h1>
    <p class="text-gray-300 mb-6">Build the correct file path by clicking the pieces in order:</p>
    <p class="text-neonBlue mb-4">Goal: Construct the path to <span class="text-neonGreen">project.html</span> inside the <span class="text-neonGreen">nodezero</span> folder inside <span class="text-neonGreen">Documents</span> on the C drive.</p>
    <div class="flex flex-wrap gap-2 mb-6">
      <button onclick="addPart('nodezero\\')" class="px-3 py-1 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">nodezero\</button>
      <button onclick="addPart('C:\\')" class="px-3 py-1 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">C:\</button>
      <button onclick="addPart('project.html')" class="px-3 py-1 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">project.html</button>
      <button onclick="addPart('Users\\')" class="px-3 py-1 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">Users\</button>
      <button onclick="addPart('Documents\\')" class="px-3 py-1 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">Documents\</button>
      <button onclick="addPart('Tori\\')" class="px-3 py-1 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">Tori\</button>
    </div>
    <div class="bg-black/60 border border-neonBlue/30 rounded p-3 font-mono text-neonGreen mb-4 min-h-[2.5rem]">
      <span id="pathDisplay">Click parts above to build the path...</span>
    </div>
    <div class="flex gap-3 mb-4">
      <button onclick="resetPath()" class="px-4 py-2 border border-red-500/40 rounded text-red-400 hover:bg-red-500/10 text-sm">Reset</button>
      <button onclick="checkPath()" class="px-4 py-2 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20 text-sm">Check Path</button>
    </div>
    <p id="feedback" class="text-neonGreen font-semibold mb-4"></p>
    <div class="flex gap-3">
      <button onclick="window.location.href='step2_see.html'" class="px-4 py-2 border border-neonBlue rounded text-neonBlue hover:bg-black/40">Back</button>
      <button onclick="window.location.href='step4_test.html'" class="px-4 py-2 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20">Next Step</button>
    </div>
  </div>
  <script>
    let path = '';
    const correct = 'C:\\Users\\Tori\\Documents\\nodezero\\project.html';
    function addPart(part) {
      path += part;
      document.getElementById('pathDisplay').textContent = path;
    }
    function resetPath() {
      path = '';
      document.getElementById('pathDisplay').textContent = 'Click parts above to build the path...';
      document.getElementById('feedback').textContent = '';
    }
    function checkPath() {
      if (path === correct) {
        document.getElementById('feedback').textContent = '✅ Correct! That is a valid absolute path.';
        document.getElementById('feedback').className = 'text-neonGreen font-semibold mb-4';
      } else {
        document.getElementById('feedback').textContent = '❌ Not quite. Try: C:\\ → Users\\ → Tori\\ → Documents\\ → nodezero\\ → project.html';
        document.getElementById('feedback').className = 'text-red-400 font-semibold mb-4';
      }
    }
  </script>
</body>
</html>
