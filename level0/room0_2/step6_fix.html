<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Step 6 - Fix: Free Up RAM</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{bgDark:"#050816",neonGreen:"#00FF9C",neonBlue:"#00C8FF"}}}};</script><style>.glow-border{box-shadow:0 0 20px #00FF9C;}.fade-in{animation:fadeIn 1.2s ease-in;}@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}.option:hover{background-color:rgba(0,255,156,0.1);cursor:pointer;}</style></head><body class="bg-bgDark text-gray-100 min-h-screen flex flex-col items-center justify-center"><div class="max-w-3xl w-full bg-black/80 border border-neonGreen/60 rounded-lg p-6 glow-border fade-in"><p class="text-neonBlue text-xs font-mono mb-2">ROOM 0.2 // STEP 6 OF 9</p><h1 class="text-3xl font-bold text-neonGreen mb-4">Step 6 -- Fix</h1><h2 class="text-xl text-neonBlue mb-4">Recover from RAM Exhaustion</h2><p class="text-gray-300 mb-6">RAM is at 99%. Choose the best immediate fix:</p><div class="space-y-3 text-left text-gray-300"><div class="option p-3 border border-neonBlue/40 rounded" onclick="pf('task')">Open Task Manager, sort by Memory, end the highest-consuming process you don't need</div><div class="option p-3 border border-neonBlue/40 rounded" onclick="pf('restart')">Reboot the entire computer without saving work</div><div class="option p-3 border border-neonBlue/40 rounded" onclick="pf('wait')">Wait for it to fix itself</div></div><p id="feedback" class="text-neonGreen font-semibold mt-6"></p><div class="mt-6 flex gap-3 flex-wrap"><a href="../../index.html" class="px-4 py-2 border border-gray-600 rounded text-gray-400 text-sm">Dashboard</a><a href="step5_break.html" class="px-4 py-2 border border-neonBlue rounded text-neonBlue hover:bg-black/40 text-sm">Back</a><a href="step7_explain.html" class="px-6 py-3 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20">Next</a></div></div><script>function pf(a){const fb=document.getElementById('feedback');if(a==='task'){fb.textContent='Correct! Ending the top RAM consumer frees memory immediately without losing work. This is the professional approach.';fb.className='text-neonGreen font-semibold mt-6';let x=parseInt(localStorage.getItem('nodezero_xp')||'0',10);x+=50;localStorage.setItem('nodezero_xp',String(x));}else if(a==='restart'){fb.textContent='Reboot works but loses unsaved work. Try Task Manager first.';fb.className='text-yellow-400 font-semibold mt-6';}else{fb.textContent='RAM exhaustion will not resolve itself -- you must free memory.';fb.className='text-red-400 font-semibold mt-6';}}let s=new Set(JSON.parse(localStorage.getItem('r02_steps')||'[]'));s.add(6);localStorage.setItem('r02_steps',JSON.stringify([...s]));let x=parseInt(localStorage.getItem('nodezero_xp')||'0',10);if(!localStorage.getItem('r02_s6_done')){x+=10;localStorage.setItem('nodezero_xp',String(x));localStorage.setItem('r02_s6_done','1');}</script></body></html>
