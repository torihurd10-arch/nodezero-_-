<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Step 2 - See: Data Flow</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{bgDark:"#050816",neonGreen:"#00FF9C",neonBlue:"#00C8FF"}}}};</script></head><body class="bg-bgDark text-gray-100 min-h-screen flex items-center justify-center"><div class="max-w-3xl w-full bg-black/80 border border-neonBlue/60 rounded-lg p-6"><p class="text-neonBlue text-xs font-mono mb-2">ROOM 0.2 // STEP 2 OF 9</p><h1 class="text-3xl font-bold text-neonGreen mb-4">Step 2 — See</h1><p class="text-gray-300 mb-4">Click each component to see how fast it is and what happens when it fails:</p><div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"><button onclick="show('cpu')" class="p-3 border border-neonBlue/40 rounded hover:border-neonGreen text-sm text-neonGreen">🧠 CPU</button><button onclick="show('cache')" class="p-3 border border-neonBlue/40 rounded hover:border-neonGreen text-sm text-neonGreen">⚡ Cache</button><button onclick="show('ram')" class="p-3 border border-neonBlue/40 rounded hover:border-neonGreen text-sm text-neonGreen">💡 RAM</button><button onclick="show('ssd')" class="p-3 border border-neonBlue/40 rounded hover:border-neonGreen text-sm text-neonGreen">💾 SSD</button></div><div id="info" class="bg-black/60 border border-neonGreen/40 rounded p-4 text-gray-300 text-sm min-h-[5rem] mb-6"><p class="text-gray-500">Click a component above.</p></div><div class="flex gap-3 flex-wrap"><a href="../../index.html" class="px-4 py-2 border border-gray-600 rounded text-gray-400 hover:bg-black/40 text-sm">⌂ Dashboard</a><a href="step1_learn.html" class="px-4 py-2 border border-neonBlue rounded text-neonBlue hover:bg-black/40 text-sm">← Back</a><a href="step3_do.html" class="px-4 py-2 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20">Next Step</a></div></div><script>const d={cpu:"CPU runs at 3-5 GHz — billions of operations per second. If CPU hits 100%, everything slows down. Use Task Manager to find which process is consuming it.",cache:"CPU cache (L1/L2/L3) is built into the processor. L1 is fastest (~1ns). Cache stores recently-used data so the CPU doesn't wait for RAM on every operation.",ram:"RAM speed: ~10-50ns access time. When RAM is full, Windows creates a pagefile on disk (virtual memory) which is 100x slower — causing the 'slowdown' you feel.",ssd:"SSD: 0.1ms access time. HDD: 5-10ms. That 50x difference is why upgrading HDD to SSD transforms an old computer. Full disk prevents swap file writes."};function show(k){document.getElementById("info").textContent=d[k];}let s=new Set(JSON.parse(localStorage.getItem("r02_steps")||"[]"));s.add(2);localStorage.setItem("r02_steps",JSON.stringify([...s]));let x=parseInt(localStorage.getItem("nodezero_xp")||"0",10);if(!localStorage.getItem("r02_s2_done")){x+=10;localStorage.setItem("nodezero_xp",String(x));localStorage.setItem("r02_s2_done","1");}</script>  <div style="position:fixed;bottom:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:999;">
