<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Step 7 - Explain</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{bgDark:"#050816",neonGreen:"#00FF9C",neonBlue:"#00C8FF"}}}};</script><style>.glow-border{box-shadow:0 0 20px #00FF9C;}.fade-in{animation:fadeIn 1.2s ease-in;}@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}textarea{background-color:rgba(0,0,0,0.6);border:1px solid #00C8FF;color:#00FF9C;}</style></head><body class="bg-bgDark text-gray-100 min-h-screen flex flex-col items-center justify-center"><div class="max-w-3xl w-full bg-black/80 border border-neonGreen/60 rounded-lg p-6 glow-border fade-in"><p class="text-neonBlue text-xs font-mono mb-2">ROOM 0.2 // STEP 7 OF 9</p><h1 class="text-3xl font-bold text-neonGreen mb-4">Step 7 -- Explain</h1><h2 class="text-xl text-neonBlue mb-4">Document the Performance Issue</h2><p class="text-gray-300 mb-6">Write a short explanation of what happened and how you fixed it. This is what you'd write in a help-desk ticket or incident report.</p><textarea id="explanation" rows="5" class="w-full rounded-lg p-3 mb-4" placeholder="Example: User reported system unresponsiveness. Task Manager showed RAM at 99% with disk at 100% due to pagefile thrashing. Ended high-memory process (Chrome with 50 tabs). RAM dropped to 60%, disk to 5%. System responsiveness restored immediately."></textarea><button onclick="save()" class="px-6 py-3 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20 transition">Save Explanation</button><p id="feedback" class="text-neonGreen font-semibold mt-6"></p><div class="mt-6 flex gap-3 flex-wrap"><a href="../../index.html" class="px-4 py-2 border border-gray-600 rounded text-gray-400 text-sm">Dashboard</a><a href="step6_fix.html" class="px-4 py-2 border border-neonBlue rounded text-neonBlue hover:bg-black/40 text-sm">Back</a><a href="step8_repeat.html" class="px-6 py-3 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20">Next</a></div></div><script>function save(){const t=document.getElementById('explanation').value.trim();if(t.length<20){document.getElementById('feedback').textContent='Please write at least one sentence.';return;}localStorage.setItem('r02_explanation',t);let x=parseInt(localStorage.getItem('nodezero_xp')||'0',10);x+=25;localStorage.setItem('nodezero_xp',String(x));document.getElementById('feedback').textContent='Saved! +25 XP for documentation.';}let s=new Set(JSON.parse(localStorage.getItem('r02_steps')||'[]'));s.add(7);localStorage.setItem('r02_steps',JSON.stringify([...s]));let x=parseInt(localStorage.getItem('nodezero_xp')||'0',10);if(!localStorage.getItem('r02_s7_done')){x+=10;localStorage.setItem('nodezero_xp',String(x));localStorage.setItem('r02_s7_done','1');}</script></body></html>
