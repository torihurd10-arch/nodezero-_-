<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 2 â€” See: Build Pipeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { bgDark: "#050816", neonGreen: "#00FF9C", neonBlue: "#00C8FF" } } }
    };
  </script>
</head>
<body class="bg-bgDark text-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-3xl w-full bg-black/80 border border-neonBlue/60 rounded-lg p-6">
    <h1 class="text-3xl font-bold text-neonGreen mb-4">Step 2 â€” See</h1>
    <p class="text-gray-300 mb-4">Click each stage of the build pipeline to see what happens:</p>
    <div class="flex flex-wrap gap-2 mb-6 justify-center">
      <button onclick="show('write')" class="px-4 py-2 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">1. Write Code</button>
      <button onclick="show('deps')" class="px-4 py-2 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">2. Install Deps</button>
      <button onclick="show('compile')" class="px-4 py-2 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">3. Compile/Run</button>
      <button onclick="show('test')" class="px-4 py-2 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">4. Test</button>
      <button onclick="show('deploy')" class="px-4 py-2 border border-neonBlue/40 rounded hover:border-neonGreen text-sm">5. Deploy</button>
    </div>
    <div id="info" class="bg-black/60 border border-neonGreen/40 rounded p-4 text-gray-300 text-sm min-h-[5rem] mb-6">
      <p class="text-gray-500">Click a stage above.</p>
    </div>
    <div class="flex gap-3">
      <button onclick="window.location.href='step1_learn.html'" class="px-4 py-2 border border-neonBlue rounded text-neonBlue hover:bg-black/40">Back</button>
      <button onclick="window.location.href='step3_do.html'" class="px-4 py-2 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20">Next Step</button>
    </div>
  </div>
  <script>
    const details = {
      write: 'A developer writes code in a text editor or IDE. Example: app.py contains Python code that processes user data.',
      deps: 'Run npm install (JavaScript) or pip install -r requirements.txt (Python) to download all required libraries. Without this step, the code will throw "module not found" errors.',
      compile: 'Compiled languages (C, Java) produce a binary. Interpreted languages (Python, JS) run directly. This is where syntax errors appear.',
      test: 'Automated tests verify the code works correctly. Unit tests, integration tests. A CI/CD pipeline runs these automatically on every code change.',
      deploy: 'The working code is moved to a production server where real users access it. Deployment tools: Docker, Kubernetes, GitHub Actions.'
    };
    function show(k) { document.getElementById('info').textContent = details[k]; }
  </script>
  <div style="position:fixed;bottom:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:999;">

    <a href="../../projects.html" style="padding:4px 10px;border:1px solid rgba(0,200,255,0.6);color:#00C8FF;font-size:11px;border-radius:6px;background:rgba(5,8,22,0.9);text-decoration:none;">Projects</a>
    <a href="../../index.html" style="padding:4px 10px;border:1px solid rgba(150,150,150,0.4);color:#9ca3af;font-size:11px;border-radius:6px;background:rgba(5,8,22,0.9);text-decoration:none;">Dashboard</a>
  </div></body>
</html>
