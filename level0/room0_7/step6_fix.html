<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 6 — Fix: Install the Dependency</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { bgDark: "#050816", neonGreen: "#00FF9C", neonBlue: "#00C8FF" } } }
    };
  </script>
  <style>
    .glow-border { box-shadow: 0 0 20px #00FF9C; }
    .fade-in { animation: fadeIn 1.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .option:hover { background-color: rgba(0,255,156,0.1); cursor: pointer; }
  </style>
</head>
<body class="bg-bgDark text-gray-100 min-h-screen flex flex-col items-center justify-center">
  <div class="max-w-3xl w-full bg-black/80 border border-neonGreen/60 rounded-lg p-6 text-center glow-border fade-in">
    <h1 class="text-3xl font-bold text-neonGreen mb-4">Step 6 — Fix</h1>
    <h2 class="text-xl text-neonBlue mb-4">Install the Missing Module</h2>
    <p class="text-gray-300 mb-6">The "requests" library is missing. Which command installs it?</p>
    <div class="space-y-4 text-left text-gray-300 font-mono">
      <div class="option p-3 border border-neonBlue/40 rounded" onclick="pf('pip')">$ pip install requests</div>
      <div class="option p-3 border border-neonBlue/40 rounded" onclick="pf('delete')">$ rm app.py</div>
      <div class="option p-3 border border-neonBlue/40 rounded" onclick="pf('download')">$ download requests.exe</div>
    </div>
    <p id="feedback" class="text-neonGreen font-semibold mt-6"></p>
    <button onclick="window.location.href='step7_explain.html'" class="mt-6 px-6 py-3 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20 transition">Next Step → Explain</button>
    <button onclick="window.location.href='step5_break.html'" class="mt-2 px-6 py-2 bg-neonBlue/10 border border-neonBlue text-neonBlue rounded hover:bg-neonBlue/20 transition">← Back</button>
  </div>
  <script>
    function pf(a) {
      const fb = document.getElementById('feedback');
      if (a === 'pip') {
        fb.textContent = '✅ Correct! pip is Python\'s package manager. "pip install requests" downloads and installs the library from PyPI (Python Package Index).';
        fb.className = 'text-neonGreen font-semibold mt-6';
        let xp = parseInt(localStorage.getItem("nodezero_xp") || "0", 10); xp += 50;
        localStorage.setItem("nodezero_xp", String(xp));
      } else {
        fb.textContent = '❌ You need to install the missing library using the package manager, not delete or download manually.';
        fb.className = 'text-red-400 font-semibold mt-6';
      }
    }
  </script>
</body>
</html>
