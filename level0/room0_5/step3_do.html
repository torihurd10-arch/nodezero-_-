<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Step 3 — Do: Order the Request</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { bgDark: "#050816", neonGreen: "#00FF9C", neonBlue: "#00C8FF" } } }
    };
  </script>
</head>
<body class="bg-bgDark text-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-3xl w-full bg-black/80 border border-neonBlue/60 rounded-lg p-6">
    <h1 class="text-3xl font-bold text-neonGreen mb-4">Step 3 — Do</h1>
    <p class="text-gray-300 mb-4">Put the steps of a web request in the correct order. Click them 1 through 5:</p>
    <div id="steps" class="space-y-2 text-gray-300"></div>
    <p id="feedback" class="text-neonGreen font-semibold mt-6 min-h-[2rem]"></p>
    <button onclick="checkOrder()" class="mt-2 px-4 py-2 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20">Check Order</button>
    <div class="mt-4 flex gap-3">
      <button onclick="window.location.href='step2_see.html'" class="px-4 py-2 border border-neonBlue rounded text-neonBlue hover:bg-black/40">Back</button>
      <button onclick="window.location.href='step4_test.html'" class="px-4 py-2 bg-neonGreen/10 border border-neonGreen text-neonGreen rounded hover:bg-neonGreen/20">Next Step</button>
    </div>
  </div>
  <script>
    const items = [
      { id: 'server', text: 'Web server sends back the HTML response' },
      { id: 'dns', text: 'DNS resolves the domain to an IP address' },
      { id: 'browser', text: 'You type a URL into your browser' },
      { id: 'render', text: 'Browser renders the page on screen' },
      { id: 'request', text: 'Browser sends HTTP request to the server' }
    ];
    const correctOrder = ['browser','dns','request','server','render'];
    let selected = [];
    function render() {
      const el = document.getElementById('steps');
      el.innerHTML = '';
      items.forEach(item => {
        const idx = selected.indexOf(item.id);
        const div = document.createElement('div');
        div.className = 'p-3 border rounded cursor-pointer ' + (idx >= 0 ? 'border-neonGreen bg-neonGreen/10' : 'border-neonBlue/40 hover:border-neonGreen');
        div.textContent = (idx >= 0 ? (idx + 1) + '. ' : '○ ') + item.text;
        div.onclick = () => {
          if (idx >= 0) selected.splice(idx, 1);
          else if (selected.length < 5) selected.push(item.id);
          render();
        };
        el.appendChild(div);
      });
    }
    function checkOrder() {
      if (selected.length < 5) { document.getElementById('feedback').textContent = '⚠️ Select all 5 steps first.'; return; }
      const ok = selected.every((id, i) => id === correctOrder[i]);
      document.getElementById('feedback').textContent = ok ? '✅ Correct order! You traced a web request perfectly.' : '❌ Not quite. Hint: Browser → DNS → Request → Server → Render.';
      document.getElementById('feedback').className = ok ? 'text-neonGreen font-semibold mt-6' : 'text-red-400 font-semibold mt-6';
    }
    render();
  </script>
</body>
</html>
